<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary System - OMP Agency</title>
    <script src="auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-white: #ffffff;
            --neon-red: #ff0033;
            --dark-bg: #020508; 
            --card-bg: rgba(255, 255, 255, 0.03); 
            --text: #ffffff;
            --blue-glow: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 20px rgba(0, 212, 255, 0.2);
            --white-glow: 0 0 10px rgba(255, 255, 255, 0.8);
            --red-glow: 0 0 10px rgba(255, 0, 51, 0.7);
        }

        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'EB Garamond', serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* ═══ EFEK ANIMASI LATAR BELAKANG ═══ */
        .bg-marquee {
            position: fixed;
            top: 250px;
            left: 0;
            width: 100%;
            white-space: nowrap;
            font-size: 80px;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            color: rgba(0, 212, 255, 0.03);
            text-transform: uppercase;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: -2;
            animation: move-text 35s linear infinite;
        }

        @keyframes move-text {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(1px 1px at 15px 25px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 80px 120px, var(--neon-blue), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 180px 90px, #fff, rgba(0,0,0,0));
            background-size: 280px 280px;
            z-index: -1;
            animation: stars-falling 22s linear infinite;
            opacity: 0.3;
        }

        @keyframes stars-falling {
            from { transform: translateY(0); }
            to { transform: translateY(1000px); }
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #05101a, #020508);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            position: relative; z-index: 10;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            color: var(--neon-white); 
            margin: 0; 
            letter-spacing: 5px; 
            font-size: 36px; 
            text-shadow: var(--white-glow), 0 0 15px var(--neon-blue); 
        }

        .auth-tag { color: var(--neon-blue); margin-top: 12px; font-weight: bold; font-size: 12px; text-shadow: var(--blue-glow); text-transform: uppercase; letter-spacing: 2px; }

        nav { background: rgba(0, 0, 0, 0.8); padding: 12px 0; border-bottom: 1px solid #0a1a2a; text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-inner a { color: #88a0b0; text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 11px; transition: 0.3s; cursor: pointer; }
        .nav-inner a:hover, .nav-inner a.active { color: var(--neon-blue); font-weight: bold; text-shadow: var(--blue-glow); }

        .btn-logout {
            color: var(--neon-red) !important;
            font-weight: bold !important;
            border: 1px solid var(--neon-red) !important;
            padding: 4px 12px !important;
            border-radius: 4px !important;
            margin-left: 10px !important;
            text-shadow: var(--red-glow);
            transition: 0.4s;
        }

        main { padding: 20px; max-width: 1200px; margin: auto; position: relative; z-index: 5; }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid rgba(0, 212, 255, 0.2); 
            margin-bottom: 40px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .grid-horizontal { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 15px; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid #1a2a3a; 
            color: #fff; 
            border-radius: 4px; 
            box-sizing: border-box;
            font-family: 'EB Garamond', serif;
        }
        
        input:focus { border-color: var(--neon-blue); outline: none; box-shadow: var(--blue-glow); }

        .btn-submit { 
            grid-column: span 4; 
            padding: 18px; 
            background: transparent; 
            color: var(--neon-blue); 
            border: 2px solid var(--neon-blue); 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: 0.3s;
        }
        
        .btn-submit:hover { background: var(--neon-blue); color: #000; box-shadow: var(--blue-glow); }

        .table-container { 
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            overflow-x: auto; 
            backdrop-filter: blur(10px);
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #05101a; color: var(--neon-blue); padding: 15px; border-bottom: 2px solid var(--neon-blue); text-transform: uppercase; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #1a2a3a; text-align: center; color: #cbd5e0; }
        
        .btn-delete { background: transparent; color: var(--neon-red); border: 1px solid var(--neon-red); padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background: var(--neon-red); color: #fff; }

        @media (max-width: 800px) {
            .grid-horizontal { grid-template-columns: 1fr 1fr; }
            .btn-submit { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <div class="bg-marquee">MIRAH AGENCY • SALARY SYSTEM • MIRAH AGENCY</div>

    <header>
        <h1>ESTUMIRAH OFFICIAL</h1>
        <div class="auth-tag">Authorized by: METROPOLIS OFFICIAL</div>
    </header>

    <nav>
        <div class="nav-inner">
            <a href="index.html" class="active">Salary Calculator</a>
            <a href="database.html">Database Gaji</a>
            <a href="event.html">Special Send</a>
            <a href="support.html">Contact Support</a>
            <a onclick="logoutSystem()" class="btn-logout">LOGOUT</a>
        </div>
    </nav>

    <main>
        <div class="card">
            <div class="grid-horizontal">
                <div><input type="text" id="hostID" placeholder="ID Host"></div>
                <div><input type="text" id="hostName" placeholder="Nama Host"></div>
                <div><input type="number" id="inputKoin" placeholder="Target Koin" oninput="hitungGaji()"></div>
                <div><input type="number" id="inputKasbon" placeholder="Kasbon (Rp)" oninput="hitungGaji()"></div>
            </div>
            <div class="grid-horizontal">
                <div><input type="text" id="resLevel" readonly placeholder="Level"></div>
                <div><input type="text" id="resGajiUSD" readonly placeholder="Gaji $"></div>
                <div><input type="text" id="resTotalIDR" readonly style="color:var(--neon-blue); font-weight:bold;" placeholder="Total Rp"></div>
                <div><select id="status"><option value="Waiting">Waiting</option><option value="Done">Done</option></select></div>
                <button class="btn-submit" onclick="simpanData()">Submit to Ledger</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>ID</th><th>NAMA</th><th>LVL</th><th>KOIN</th><th>BASE ($)</th><th>GAJI (Rp)</th><th>KASBON</th><th>TOTAL</th><th>STATUS</th><th>AKSI</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const KURS = 15500;
        const masterGaji = [{koin:5000,lvl:'A',usd:2.5},{koin:8000,lvl:'B',usd:4.0},{koin:13000,lvl:'C',usd:6.5},{koin:19000,lvl:'D',usd:9.4},{koin:27000,lvl:'E',usd:13.2},{koin:37000,lvl:'F',usd:18.0},{koin:52000,lvl:'G',usd:25.1},{koin:67000,lvl:'H',usd:32.1},{koin:88000,lvl:'I',usd:42.0},{koin:110000,lvl:'J',usd:52.1},{koin:135000,lvl:'K',usd:63.0},{koin:165000,lvl:'L',usd:76.0},{koin:195000,lvl:'M',usd:89.0},{koin:230000,lvl:'N',usd:104.0},{koin:270000,lvl:'O',usd:121.0},{koin:310000,lvl:'P',usd:137.0},{koin:360000,lvl:'Q',usd:157.0},{koin:400000,lvl:'S1',usd:168.0},{koin:450000,lvl:'S2',usd:180.0},{koin:500000,lvl:'S3',usd:195.0},{koin:650000,lvl:'S4',usd:250.0},{koin:800000,lvl:'S5',usd:300.0},{koin:950000,lvl:'S6',usd:350.0},{koin:1100000,lvl:'S7',usd:395.0}];
        
        let currentData = { lvl: '-', usd: 0 };

        function hitungGaji() {
            const koin = parseInt(document.getElementById('inputKoin').value) || 0;
            const kasbon = parseInt(document.getElementById('inputKasbon').value) || 0;
            let hasil = { lvl: '-', usd: 0 };
            for (let i = masterGaji.length - 1; i >= 0; i--) { if (koin >= masterGaji[i].koin) { hasil = masterGaji[i]; break; } }
            currentData = hasil;
            const gajiBersih = (hasil.usd * KURS) - kasbon;
            document.getElementById('resLevel').value = hasil.lvl;
            document.getElementById('resGajiUSD').value = hasil.usd + " $";
            document.getElementById('resTotalIDR').value = "Rp " + gajiBersih.toLocaleString('id-ID');
        }

        function simpanData() {
            const id = document.getElementById('hostID').value;
            const nama = document.getElementById('hostName').value;
            const koin = parseInt(document.getElementById('inputKoin').value) || 0;
            const kasbon = parseInt(document.getElementById('inputKasbon').value) || 0;
            const status = document.getElementById('status').value;
            if (!id || !nama || !koin) return alert("Isi ID, Nama, dan Koin!");
            const entry = { id, nama, lvl: currentData.lvl, koin, usd: currentData.usd, kotor: (currentData.usd * KURS), kasbon, bersih: (currentData.usd * KURS) - kasbon, status };
            let db = JSON.parse(localStorage.getItem('agencyData') || '[]');
            db.push(entry);
            localStorage.setItem('agencyData', JSON.stringify(db));
            renderTable(db);
            // Reset input after submit
            document.getElementById('hostID').value = '';
            document.getElementById('hostName').value = '';
            document.getElementById('inputKoin').value = '';
            document.getElementById('inputKasbon').value = '';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            data.forEach((item, index) => {
                const isDone = item.status === 'Done';
                const editAttr = isDone ? '' : 'contenteditable="true"';
                const editBg = isDone ? '' : 'background:rgba(0,212,255,0.05);';
                tbody.innerHTML += `<tr>
                    <td ${editAttr} style="${editBg}" onblur="updateRow(${index},'id',this.innerText)">${item.id}</td>
                    <td ${editAttr} style="${editBg}" onblur="updateRow(${index},'nama',this.innerText)">${item.nama}</td>
                    <td>${item.lvl}</td>
                    <td ${editAttr} style="${editBg}" onblur="updateRow(${index},'koin',this.innerText)">${item.koin}</td>
                    <td>${item.usd}$</td>
                    <td>Rp ${item.kotor.toLocaleString()}</td>
                    <td ${editAttr} style="${editBg}color:var(--neon-red);" onblur="updateRow(${index},'kasbon',this.innerText)">${item.kasbon}</td>
                    <td style="color:var(--neon-blue); font-weight:bold;">Rp ${item.bersih.toLocaleString()}</td>
                    <td>
                        <select onchange="updateRow(${index},'status',this.value)" style="padding:4px; font-size:11px;">
                            <option value="Waiting" ${item.status==='Waiting'?'selected':''}>Waiting</option>
                            <option value="Done" ${item.status==='Done'?'selected':''}>Done</option>
                        </select>
                    </td>
                    <td><button class="btn-delete" onclick="hapusData(${index})">Hapus</button></td>
                </tr>`;
            });
        }

        function updateRow(index, field, value) {
            let db = JSON.parse(localStorage.getItem('agencyData'));
            if (db[index].status === 'Done' && field !== 'status') return renderTable(db);
            if (field === 'koin' || field === 'kasbon') {
                db[index][field] = parseInt(value.toString().replace(/\D/g,'')) || 0;
                let c = {lvl:'-',usd:0};
                for(let i=masterGaji.length-1;i>=0;i--) if(db[index].koin>=masterGaji[i].koin){c=masterGaji[i];break;}
                db[index].lvl=c.lvl; db[index].usd=c.usd; db[index].kotor=c.usd*KURS; db[index].bersih=db[index].kotor-db[index].kasbon;
            } else { db[index][field] = value; }
            localStorage.setItem('agencyData', JSON.stringify(db));
            renderTable(db);
        }

        function hapusData(index) { 
            if(confirm("Hapus data ini?")) {
                let db = JSON.parse(localStorage.getItem('agencyData')); 
                db.splice(index,1); 
                localStorage.setItem('agencyData',JSON.stringify(db)); 
                renderTable(db); 
            }
        }

        window.onload = () => { 
            const s = localStorage.getItem('agencyData'); 
            if(s) renderTable(JSON.parse(s)); 
        };

        function logoutSystem() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
